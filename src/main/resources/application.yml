spring:
  datasource:
    url: jdbc:h2:mem:todo;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  h2:
    console:
      enabled: true

  data:
    web:
      pageable:
        default-page-size: 10
        max-page-size: 100

server:
  port: 8080

logging:
  pattern:
    level: "%5p [requestId=%X{requestId}]"
